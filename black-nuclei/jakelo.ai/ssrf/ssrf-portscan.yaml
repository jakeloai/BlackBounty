id: ssrf-portscan

info:
  name: Internal Port Scanner via SSRF
  author: Jake Lo.ai
  severity: info

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=http://127.0.0.1:{{port}}"

    payloads:
      port: [21, 22, 25, 80, 443, 8080, 3306, 6379]

    matchers:
      - type: status
        status:
          - 200
